name: CI Frontend

# Checks de calidad para las apps Next (lint + typecheck + build).
# No despliega — los deploys son manuales (ver ADR-0009).
# Corre en todo PR/push (sin filtro de paths) para que el status check sea
# confiable como required en branch protection; la detección "si la app existe"
# hace el skip rápido cuando aplica.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [sitio, catalogo]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Detectar si la app existe
        id: exists
        shell: bash
        run: |
          if [ -f "package.json" ]; then echo "go=true" >> "$GITHUB_OUTPUT"; else echo "go=false" >> "$GITHUB_OUTPUT"; echo "apps/${{ matrix.app }} aún no existe, saltando."; fi

      - uses: actions/setup-node@v4
        if: steps.exists.outputs.go == 'true'
        with:
          # Versión única del toolchain: .nvmrc (raíz). CI y local no pueden
          # divergir; subir de versión = editar ese archivo. Ver ADR-0022.
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install
        if: steps.exists.outputs.go == 'true'
        run: npm ci

      - name: Lint
        if: steps.exists.outputs.go == 'true'
        run: npm run lint --if-present

      - name: Typecheck
        if: steps.exists.outputs.go == 'true'
        run: npx tsc --noEmit

      # Valida todas las fichas de fauna contra el esquema (solo catalogo).
      # Un `error` en cualquier ficha rompe el check; warnings solo informan. Ver #91.
      - name: Validar fichas
        if: matrix.app == 'catalogo' && steps.exists.outputs.go == 'true'
        run: npm run validate:fichas

      - name: Build
        if: steps.exists.outputs.go == 'true'
        run: npm run build
