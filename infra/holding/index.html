<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunidad Chirimoyo — Sitio en Construcción</title>
  <meta name="description" content="Comunidad Chirimoyo — defensa del humedal de Chirimoyo, Orizaba, Veracruz. Sitio en construcción." />
  <meta property="og:title" content="Comunidad Chirimoyo" />
  <meta property="og:description" content="Defensa del humedal de Chirimoyo, Orizaba, Veracruz. Muy pronto." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forest: #15824c; --forest-deep: #0c5a36; --pine-deep: #052e1b;
      --mint: #8ed8c0; --mint-soft: #cdeedd; --mint-wash: #e4f3ec;
      --paper: #eef5ef; --ink: #143226; --ink-soft: #3a5547;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: var(--paper); color: var(--ink);
      font-family: "Source Sans 3", system-ui, sans-serif;
      background-image: radial-gradient(120% 80% at 50% -10%, var(--mint-wash) 0%, var(--paper) 60%);
      padding: 2rem;
    }
    main { max-width: 40rem; text-align: center; }
    .kicker {
      font-size: 12px; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--forest); display: inline-flex; align-items: center; gap: .5rem;
    }
    .kicker::before, .kicker::after { content: ""; width: 28px; height: 1px; background: var(--forest); opacity: .4; }
    h1 {
      font-family: "Cormorant Garamond", Georgia, serif; font-weight: 600;
      font-size: clamp(40px, 8vw, 76px); line-height: 0.98; color: var(--forest-deep);
      margin: 1.25rem 0 0;
    }
    p.lead { margin-top: 1.25rem; font-size: 18px; line-height: 1.7; color: var(--ink-soft); }
    .logo {
      width: clamp(160px, 32vw, 240px); height: auto; display: block; margin: 0 auto 1.25rem;
    }
    .cta { margin-top: 2.25rem; display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
    .cta a {
      text-decoration: none; font-weight: 600; font-size: 15px;
      padding: .7rem 1.2rem; border-radius: 999px; transition: background .15s, color .15s;
    }
    .cta .primary { background: var(--forest); color: #fff; }
    .cta .primary:hover { background: var(--forest-deep); }
    .cta .ghost { background: var(--mint-wash); color: var(--forest-deep); box-shadow: inset 0 0 0 1px rgba(21,130,76,.2); }
    .cta .ghost:hover { background: var(--mint-soft); }
    footer { margin-top: 3rem; font-size: 13px; color: var(--ink-soft); opacity: .8; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="logo-chirimoyo.jpeg" alt="Comunidad del Chirimoyo" />
    <span class="kicker">Comunidad Chirimoyo</span>
    <h1>Sitio en Construcción</h1>
    <p class="lead">
      Vecinos y científicos cuidando un territorio vivo al norte de Orizaba, Veracruz.
    </p>
    <div class="cta">
      <a class="primary" href="https://aves.chirimoyo.org">Catálogo de aves</a>
      <a class="ghost" href="mailto:contacto@chirimoyo.org">Contacto</a>
    </div>
    <footer>Laguna del Chirimoyo · Orizaba, Veracruz, México</footer>
  </main>
</body>
</html>
